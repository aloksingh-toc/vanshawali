spring.application.name=vanshawali-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vanshawali}
spring.datasource.username=${DB_USERNAME:vanshawali_user}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8080

app.jwt.secret=${JWT_SECRET:changeme-set-a-real-32-byte-secret-via-env-var}
app.jwt.expiration-minutes=720

app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:changeme}
app.admin.display-name=${ADMIN_DISPLAY_NAME:Admin}

app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

app.uploads.dir=uploads

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
